# Build and release binaries on version tag push (e.g. v1.0.0)

name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          LDFLAGS="-s -w"
          go build -ldflags "$LDFLAGS" -o grant-linux-amd64 ./cmd/oauth
          GOARCH=arm64 go build -ldflags "$LDFLAGS" -o grant-linux-arm64 ./cmd/oauth
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o grant-darwin-amd64 ./cmd/oauth
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o grant-darwin-arm64 ./cmd/oauth
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o grant-windows-amd64.exe ./cmd/oauth

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grant-linux-amd64
            grant-linux-arm64
            grant-darwin-amd64
            grant-darwin-arm64
            grant-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
